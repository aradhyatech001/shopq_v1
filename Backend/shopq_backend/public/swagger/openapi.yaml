openapi: 3.0.3

info:
  title: ShopQ API
  description: |
    REST API for ShopQ — user app, vendor app, and admin panel.

    ## Authentication
    | App | Method | Header |
    |---|---|---|
    | User App | Bearer Token (Sanctum) | `Authorization: Bearer <token>` |
    | Vendor App | Bearer Token (Sanctum vendor guard) | `Authorization: Bearer <token>` |
    | Admin Panel | Bearer Token (admin guard) | `Authorization: Bearer <token>` |

    Tokens are returned from the respective login endpoints.
  version: "1.0.0"
  contact:
    name: ShopQ Dev Team

servers:
  - url: http://192.168.1.7:8000/api
    description: Local dev server
  - url: http://localhost:8000/api
    description: Localhost

tags:
  - name: User Auth
  - name: Banners
  - name: Categories
  - name: Products
  - name: Product Types
  - name: Home Tabs
  - name: Cart
  - name: Wishlist
  - name: Orders
  - name: Delivery Address
  - name: Coupons
  - name: Settings
  - name: Help
  - name: Location
  - name: Pincodes
  - name: Subscription Plans
  - name: Vendor Auth
  - name: Vendor Products
  - name: Admin
  - name: Admin — Vendors
  - name: Admin — Pincodes
  - name: Admin — Subscription Plans

components:
  securitySchemes:
    UserBearer:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: "Sanctum token from POST /auth/login"
    VendorBearer:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: "Sanctum token from POST /vendor/login"
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: "Admin token from POST /admin/login"

  schemas:
    SuccessTrue:
      type: object
      properties:
        success:
          type: boolean
          example: true

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        image_url: { type: string, nullable: true }
        icon_url: { type: string, nullable: true }
        color_code: { type: string, example: "#FFFFFF" }
        tab_banner_url: { type: string, nullable: true }
        tab_bg_color: { type: string, example: "#F5F5F5" }
        description: { type: string, nullable: true }
        is_active: { type: integer, example: 1 }
        position: { type: integer }

    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        price: { type: number }
        sale_price: { type: number, nullable: true }
        image: { type: string, nullable: true }
        stock: { type: integer }
        category_id: { type: integer, nullable: true }
        is_active: { type: integer }

    Order:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        status: { type: string, enum: [pending, processing, delivered, cancelled] }
        total: { type: number }
        created_at: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            properties:
              product_name: { type: string }
              quantity: { type: integer }
              price: { type: number }

paths:

  # ──────────────────────────────────────────
  # USER AUTH
  # ──────────────────────────────────────────

  /auth/signup:
    post:
      tags: [User Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, phone]
              properties:
                name: { type: string, example: "John Doe" }
                email: { type: string, example: "john@example.com" }
                password: { type: string, example: "secret123" }
                phone: { type: string, example: "9876543210" }
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  user: { type: object }
        "422":
          description: Validation error

  /auth/login:
    post:
      tags: [User Auth]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: "john@example.com" }
                password: { type: string, example: "secret123" }
      responses:
        "200":
          description: Login successful — returns token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  user: { type: object }
        "401":
          description: Invalid credentials

  /auth/forgot-password:
    post:
      tags: [User Auth]
      summary: Send OTP for password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        "200":
          description: OTP sent

  /auth/verify-otp:
    post:
      tags: [User Auth]
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email: { type: string }
                otp: { type: string, example: "123456" }
      responses:
        "200":
          description: OTP verified

  /auth/reset-password:
    post:
      tags: [User Auth]
      summary: Reset password after OTP verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password]
              properties:
                email: { type: string }
                otp: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Password reset successful

  /auth/user:
    get:
      tags: [User Auth]
      summary: Get user by ID (public)
      parameters:
        - in: query
          name: user_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User data

  /auth/logout:
    post:
      tags: [User Auth]
      summary: Logout (invalidate token)
      security:
        - UserBearer: []
      responses:
        "200":
          description: Logged out

  /auth/edit-profile:
    post:
      tags: [User Auth]
      summary: Edit user profile
      security:
        - UserBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                image: { type: string, format: binary }
      responses:
        "200":
          description: Profile updated

  /auth/set-pincode:
    post:
      tags: [User Auth]
      summary: Set user delivery pincode
      security:
        - UserBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pincode_id]
              properties:
                pincode_id: { type: integer }
      responses:
        "200":
          description: Pincode set

  # ──────────────────────────────────────────
  # BANNERS
  # ──────────────────────────────────────────

  /banners:
    get:
      tags: [Banners]
      summary: Get active banners (public)
      responses:
        "200":
          description: Banner list

  /admin/banners:
    get:
      tags: [Banners]
      summary: Get all banners including inactive (admin)
      security:
        - AdminBearer: []
      responses:
        "200":
          description: All banners

  /banners/add:
    post:
      tags: [Banners]
      summary: Add banner (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image: { type: string, format: binary }
                title: { type: string }
                link: { type: string }
      responses:
        "200":
          description: Banner added

  /banners/edit:
    post:
      tags: [Banners]
      summary: Edit banner (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
                image: { type: string, format: binary }
                title: { type: string }
      responses:
        "200":
          description: Banner updated

  /banners/toggle:
    post:
      tags: [Banners]
      summary: Toggle banner active/inactive (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Toggled

  /banners/delete:
    post:
      tags: [Banners]
      summary: Delete banner (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Deleted

  # ──────────────────────────────────────────
  # CATEGORIES
  # ──────────────────────────────────────────

  /categories:
    get:
      tags: [Categories]
      summary: Get active main categories (public)
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"

  /admin/categories:
    get:
      tags: [Categories]
      summary: Get all categories including inactive (admin)
      security:
        - AdminBearer: []
      responses:
        "200":
          description: All categories

  /categories/subcategories:
    get:
      tags: [Categories]
      summary: Get subcategories (active only unless ?admin=1)
      parameters:
        - in: query
          name: parent_id
          schema: { type: integer }
          description: Filter by parent category
        - in: query
          name: admin
          schema: { type: integer, enum: [0, 1] }
          description: Pass 1 to include inactive subcategories
      responses:
        "200":
          description: Subcategory list

  /admin/categories/subcategories:
    get:
      tags: [Categories]
      summary: Get all subcategories (admin)
      security:
        - AdminBearer: []
      responses:
        "200":
          description: All subcategories

  /categories/add:
    post:
      tags: [Categories]
      summary: Add main category (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [category_name, image]
              properties:
                category_name: { type: string }
                image: { type: string, format: binary }
                icon_url: { type: string }
                color_code: { type: string, example: "#FFFFFF" }
                position: { type: integer }
      responses:
        "200":
          description: Category added

  /categories/edit:
    post:
      tags: [Categories]
      summary: Edit main category (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
                category_name: { type: string }
                image: { type: string, format: binary }
                icon_url: { type: string }
                color_code: { type: string }
                position: { type: integer }
                is_active: { type: integer, enum: [0, 1] }
      responses:
        "200":
          description: Category updated

  /categories/delete:
    post:
      tags: [Categories]
      summary: Delete category (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Deleted

  /categories/subcategories/add:
    post:
      tags: [Categories]
      summary: Add subcategory (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [category_name, parent_id]
              properties:
                category_name: { type: string }
                parent_id: { type: integer }
                image: { type: string, format: binary }
                position: { type: integer }
      responses:
        "200":
          description: Subcategory added

  /categories/subcategories/edit:
    post:
      tags: [Categories]
      summary: Edit subcategory (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
                category_name: { type: string }
                image: { type: string, format: binary }
                position: { type: integer }
                is_active: { type: integer, enum: [0, 1] }
      responses:
        "200":
          description: Subcategory updated

  /categories/subcategories/delete:
    post:
      tags: [Categories]
      summary: Delete subcategory (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Deleted

  # ──────────────────────────────────────────
  # PRODUCT TYPES
  # ──────────────────────────────────────────

  /product-types:
    get:
      tags: [Product Types]
      summary: Get all product types (public)
      responses:
        "200":
          description: Product type list

  /product-types/add:
    post:
      tags: [Product Types]
      summary: Add product type (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                position: { type: integer }
      responses:
        "200":
          description: Added

  /product-types/edit:
    post:
      tags: [Product Types]
      summary: Edit product type (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name]
              properties:
                id: { type: integer }
                name: { type: string }
                position: { type: integer }
      responses:
        "200":
          description: Updated

  /product-types/delete:
    post:
      tags: [Product Types]
      summary: Delete product type (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Deleted

  /product-types/reorder:
    post:
      tags: [Product Types]
      summary: Reorder product types (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items: { type: integer }
                  description: IDs in desired order
      responses:
        "200":
          description: Reordered

  # ──────────────────────────────────────────
  # HOME TABS
  # ──────────────────────────────────────────

  /home-tabs:
    get:
      tags: [Home Tabs]
      summary: Get active home tabs (public)
      responses:
        "200":
          description: Active home tabs

  /home-tabs/all:
    get:
      tags: [Home Tabs]
      summary: Get all home tabs including inactive (admin)
      security:
        - AdminBearer: []
      responses:
        "200":
          description: All home tabs

  /home-tabs/add:
    post:
      tags: [Home Tabs]
      summary: Add home tab (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, tab_type]
              properties:
                name: { type: string }
                tab_type: { type: string, enum: [category, type, deals, all] }
                ref_id: { type: integer }
                position: { type: integer }
                banner_image: { type: string, format: binary }
      responses:
        "200":
          description: Added

  /home-tabs/edit:
    post:
      tags: [Home Tabs]
      summary: Edit home tab (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
                name: { type: string }
                tab_type: { type: string }
                ref_id: { type: integer }
                position: { type: integer }
                banner_image: { type: string, format: binary }
      responses:
        "200":
          description: Updated

  /home-tabs/delete:
    post:
      tags: [Home Tabs]
      summary: Delete home tab (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Deleted

  /home-tabs/toggle:
    post:
      tags: [Home Tabs]
      summary: Toggle home tab active/inactive (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Toggled

  /home-tabs/reorder:
    post:
      tags: [Home Tabs]
      summary: Reorder home tabs (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items: { type: integer }
      responses:
        "200":
          description: Reordered

  # ──────────────────────────────────────────
  # PRODUCTS
  # ──────────────────────────────────────────

  /products:
    get:
      tags: [Products]
      summary: Get all products (public)
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Product list

  /products/by-category:
    get:
      tags: [Products]
      summary: Get products by category (public)
      parameters:
        - in: query
          name: category_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Products in category

  /products/by-type:
    get:
      tags: [Products]
      summary: Get products by type (public)
      parameters:
        - in: query
          name: type_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Products of type

  /products/by-subcategory:
    get:
      tags: [Products]
      summary: Get products by subcategory (public)
      parameters:
        - in: query
          name: subcategory_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Products in subcategory

  /products/single:
    get:
      tags: [Products]
      summary: Get single product (public)
      parameters:
        - in: query
          name: product_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product detail

  /products/insert:
    post:
      tags: [Products]
      summary: Add product (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, price]
              properties:
                name: { type: string }
                price: { type: number }
                sale_price: { type: number }
                stock: { type: integer }
                category_id: { type: integer }
                subcategory_id: { type: integer }
                type_id: { type: integer }
                image: { type: string, format: binary }
                description: { type: string }
                weight: { type: string }
                unit: { type: string }
      responses:
        "200":
          description: Product added

  /products/update:
    post:
      tags: [Products]
      summary: Update product (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
                name: { type: string }
                price: { type: number }
                sale_price: { type: number }
                stock: { type: integer }
                category_id: { type: integer }
                image: { type: string, format: binary }
      responses:
        "200":
          description: Product updated

  /products/delete:
    post:
      tags: [Products]
      summary: Delete product (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        "200":
          description: Deleted

  /products/update-stock:
    post:
      tags: [Products]
      summary: Update product stock (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, stock]
              properties:
                id: { type: integer }
                stock: { type: integer }
      responses:
        "200":
          description: Stock updated

  /products/update-type:
    post:
      tags: [Products]
      summary: Update product type (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, type_id]
              properties:
                id: { type: integer }
                type_id: { type: integer }
      responses:
        "200":
          description: Type updated

  /products/upload-image:
    post:
      tags: [Products]
      summary: Upload product image (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id, image]
              properties:
                id: { type: integer }
                image: { type: string, format: binary }
      responses:
        "200":
          description: Image uploaded

  /products/variant:
    post:
      tags: [Products]
      summary: Save product variant (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id: { type: integer }
                variants:
                  type: array
                  items: { type: object }
      responses:
        "200":
          description: Variant saved

  /products/highlight:
    post:
      tags: [Products]
      summary: Save product highlights (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id: { type: integer }
                highlights: { type: array, items: { type: string } }
      responses:
        "200":
          description: Highlights saved

  /products/info:
    post:
      tags: [Products]
      summary: Save product info/specifications (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id: { type: integer }
                info: { type: array, items: { type: object } }
      responses:
        "200":
          description: Info saved

  # ──────────────────────────────────────────
  # CART
  # ──────────────────────────────────────────

  /cart/add:
    post:
      tags: [Cart]
      summary: Add item to cart (no auth — uses user_id)
      requestBody:
        required: true
